<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程救援系统 - 控制台</title>
    <link rel="stylesheet" href="css/style.css?v=3">
    <script src="js/bg-random.js?v=3"></script>
    <script src="js/auth-check.js?v=3"></script>
    <script>
        if (!AuthCheck.checkAuth()) {
            throw new Error('未授权访问');
        }
    </script>
</head>
<body class="main-page">
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-brand">
            <div class="logo-small">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span>远程救援系统</span>
        </div>
        <div class="nav-actions">
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span id="statusText">已连接</span>
            </div>
            <button class="logout-btn" onclick="logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                退出
            </button>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 上半部分：实时信息区域 -->
        <section class="info-section">
            <h2 class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                救援端实时信息
            </h2>
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-card-header">
                        <div class="info-card-icon blue">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </div>
                        <span class="info-card-label">计算机名称</span>
                    </div>
                    <div class="info-card-value" id="machineName">--</div>
                </div>

                <div class="info-card">
                    <div class="info-card-header">
                        <div class="info-card-icon green">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <span class="info-card-label">当前用户</span>
                    </div>
                    <div class="info-card-value" id="userName">--</div>
                </div>

                <div class="info-card">
                    <div class="info-card-header">
                        <div class="info-card-icon purple">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                            </svg>
                        </div>
                        <span class="info-card-label">操作系统</span>
                    </div>
                    <div class="info-card-value" id="osVersion">--</div>
                </div>

                <div class="info-card">
                    <div class="info-card-header">
                        <div class="info-card-icon orange">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                                <rect x="9" y="9" width="6" height="6"></rect>
                                <line x1="9" y1="1" x2="9" y2="4"></line>
                                <line x1="15" y1="1" x2="15" y2="4"></line>
                                <line x1="9" y1="20" x2="9" y2="23"></line>
                                <line x1="15" y1="20" x2="15" y2="23"></line>
                                <line x1="20" y1="9" x2="23" y2="9"></line>
                                <line x1="20" y1="14" x2="23" y2="14"></line>
                                <line x1="1" y1="9" x2="4" y2="9"></line>
                                <line x1="1" y1="14" x2="4" y2="14"></line>
                            </svg>
                        </div>
                        <span class="info-card-label">处理器核心</span>
                    </div>
                    <div class="info-card-value" id="processorCount">--</div>
                </div>

                <div class="info-card">
                    <div class="info-card-header">
                        <div class="info-card-icon cyan">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                        <span class="info-card-label">系统运行时间</span>
                    </div>
                    <div class="info-card-value" id="uptime">--</div>
                </div>

                <div class="info-card">
                    <div class="info-card-header">
                        <div class="info-card-icon red">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                        </div>
                        <span class="info-card-label">最后更新</span>
                    </div>
                    <div class="info-card-value" id="lastUpdate">--</div>
                </div>

                <div class="info-card explorer-card">
                    <div class="info-card-header">
                        <div class="info-card-icon yellow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </div>
                        <span class="info-card-label">Explorer.exe</span>
                    </div>
                    <div class="info-card-value explorer-value" id="explorerInfo">--</div>
                </div>
            </div>
        </section>

        <!-- 下半部分：功能按钮区域 -->
        <section class="actions-section">
            <h2 class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>
                紧急救援操作
            </h2>
            <div class="actions-grid">
                <!-- 重启RDP服务 -->
                <div class="action-card rdp" id="btnRdp" onclick="restartRDP()">
                    <div class="action-icon-wrapper">
                        <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                            <path d="M8 11l3 3 5-5"></path>
                        </svg>
                    </div>
                    <div class="action-content">
                        <h3 class="action-title">重启RDP服务</h3>
                        <p class="action-desc">重新启动远程桌面服务，解决远程连接异常问题</p>
                    </div>
                    <div class="action-status" id="statusRdp"></div>
                </div>

                <!-- 重启Explorer -->
                <div class="action-card explorer" id="btnExplorer" onclick="restartExplorer()">
                    <div class="action-icon-wrapper">
                        <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            <line x1="12" y1="11" x2="12" y2="17"></line>
                            <line x1="9" y1="14" x2="15" y2="14"></line>
                        </svg>
                    </div>
                    <div class="action-content">
                        <h3 class="action-title">重启Explorer</h3>
                        <p class="action-desc">重启资源管理器进程，修复桌面卡顿或无响应问题</p>
                    </div>
                    <div class="action-status" id="statusExplorer"></div>
                </div>

                <!-- 重启服务器 -->
                <div class="action-card server" id="btnServer" onclick="restartServer()">
                    <div class="action-icon-wrapper">
                        <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                            <path d="M12 13v8"></path>
                            <path d="M8 21h8"></path>
                        </svg>
                    </div>
                    <div class="action-content">
                        <h3 class="action-title">重启服务器</h3>
                        <p class="action-desc">执行系统重启操作，10秒后服务器将重新启动</p>
                    </div>
                    <div class="action-status" id="statusServer"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 确认对话框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-icon" id="modalIcon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h3 class="modal-title" id="modalTitle">确认操作</h3>
            <p class="modal-message" id="modalMessage">您确定要执行此操作吗？</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-primary" id="modalConfirmBtn" onclick="confirmAction()">确认</button>
            </div>
        </div>
    </div>

    <script src="js/main.js?v=3"></script>

    <!-- GitHub 链接 -->
    <footer class="github-footer">
        <a href="https://github.com/linfon18/WinServerRemoteRescue.git" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub: WinServerRemoteRescue
        </a>
    </footer>
</body>
</html>
